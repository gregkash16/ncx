<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TRENCH RUN</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 900;
canvas.height = 500;
const W = canvas.width, H = canvas.height;

// ── AUDIO ──────────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function resumeAC(){ if(AC.state==='suspended') AC.resume(); }

function playTone(freq0, freq1, dur, type='square', vol=0.25){
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.connect(g); g.connect(AC.destination);
  o.frequency.setValueAtTime(freq0, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(freq1, AC.currentTime+dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime+dur);
  o.start(AC.currentTime); o.stop(AC.currentTime+dur);
}

function playNoise(dur=0.25, vol=0.4){
  const buf=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
  const s=AC.createBufferSource(), g=AC.createGain();
  s.buffer=buf; s.connect(g); g.connect(AC.destination);
  g.gain.setValueAtTime(vol, AC.currentTime);
  s.start();
}

function sfxShoot(){ playTone(900,180,0.12,'square',0.18); }
function sfxEnemyShoot(){ playTone(350,90,0.14,'sawtooth',0.12); }
function sfxExplode(big){ playNoise(big?0.5:0.25, big?0.5:0.3); }
function sfxHit(){ playTone(180,60,0.1,'sawtooth',0.3); }
function sfxWin(){
  [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,f,0.3,'sine',0.4),i*200));
}

// ── MUSIC ──────────────────────────────────────────────────────────────────
let _musicOn=false, _musicVader=false, _musicNext=0, _musicIdx=0;
let _droneA=null,_droneB=null,_droneGA=null,_droneGB=null;
const MUS_NORM={notes:[110,147,165,220,165,147,110,196],tempo:0.9,vol:0.026,type:'sine'};
const MUS_VADER={notes:[73.4,87.3,73.4,65.4,73.4,98,82.4,73.4],tempo:0.38,vol:0.034,type:'triangle'};

function startMusic(){
  if(_musicOn) return; _musicOn=true; _musicVader=false; _musicIdx=0; _musicNext=AC.currentTime+0.4;
  _droneGA=AC.createGain(); _droneGA.gain.value=0.05;
  _droneA=AC.createOscillator(); _droneA.type='sine'; _droneA.frequency.value=55;
  _droneA.connect(_droneGA); _droneGA.connect(AC.destination); _droneA.start();
  _droneGB=AC.createGain(); _droneGB.gain.value=0.03;
  _droneB=AC.createOscillator(); _droneB.type='sine'; _droneB.frequency.value=82.4;
  _droneB.connect(_droneGB); _droneGB.connect(AC.destination); _droneB.start();
}

function stopMusic(){
  if(!_musicOn) return; _musicOn=false; _musicVader=false;
  try{_droneA.stop();}catch(e){} try{_droneB.stop();}catch(e){}
  _droneA=_droneB=_droneGA=_droneGB=null;
}

function shiftMusicVader(){
  if(_musicVader) return; _musicVader=true; _musicIdx=0; _musicNext=AC.currentTime+0.05;
  if(_droneA) _droneA.frequency.setTargetAtTime(36.7,AC.currentTime,2);
  if(_droneB) _droneB.frequency.setTargetAtTime(55,AC.currentTime,2);
  if(_droneGA) _droneGA.gain.setTargetAtTime(0.07,AC.currentTime,0.7);
  if(_droneGB) _droneGB.gain.setTargetAtTime(0.05,AC.currentTime,0.7);
}

function updateMusic(){
  if(!_musicOn||AC.state==='suspended'||AC.currentTime<_musicNext) return;
  const m=_musicVader?MUS_VADER:MUS_NORM;
  const o=AC.createOscillator(),g=AC.createGain();
  o.type=m.type; o.frequency.value=m.notes[_musicIdx%m.notes.length];
  o.connect(g); g.connect(AC.destination);
  g.gain.setValueAtTime(m.vol,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+m.tempo*0.88);
  o.start(AC.currentTime); o.stop(AC.currentTime+m.tempo);
  _musicNext=AC.currentTime+m.tempo; _musicIdx++;
}

// ── TRENCH GENERATION ────────────────────────────────────────────────────
const SEG = 16; // pixels per segment
const TOTAL_PX = 18000;
const NUM_SEGS = Math.ceil(TOTAL_PX/SEG) + Math.ceil(W/SEG) + 10;
let trench = []; // {top, bot}

function generateTrench(){
  trench=[];
  let top=100, bot=H-100;
  let topT=top, botT=bot;
  for(let i=0; i<NUM_SEGS; i++){
    const prog = i/(TOTAL_PX/SEG);
    if(i%25===0){
      const minGap = Math.max(160, 230-prog*80);
      const range = H - 120 - minGap;
      topT = 60 + Math.random()*range*0.6;
      botT = topT + minGap + Math.random()*range*0.4;
      if(botT > H-60) botT = H-60;
      if(botT-topT < minGap){ const c=(topT+botT)/2; topT=c-minGap/2; botT=c+minGap/2; }
    }
    top += (topT-top)*0.04;
    bot += (botT-bot)*0.04;
    // Add wall protrusions (obstacles)
    let extraTop=0, extraBot=0;
    if(i>50 && i%40===0 && prog>0.15){
      const protrude = 20+Math.random()*40;
      if(Math.random()<0.5) extraTop=protrude; else extraBot=protrude;
    }
    trench.push({top:Math.round(top)+extraTop, bot:Math.round(bot)-extraBot});
  }
}

function getTrench(screenX){
  const idx = Math.floor((dist+screenX)/SEG);
  if(idx<0) return {top:80, bot:H-80};
  if(idx>=trench.length) return {top:80, bot:H-80};
  return trench[idx];
}

// ── STATE ────────────────────────────────────────────────────────────────
let state='title'; // title|playing|dead|win|enter_name|leaderboard
let frame=0, dist=0, score=0;
let highScore=0; // set after leaderboard loads below
let spd=2; // scroll speed px/frame
const TOTAL_DIST = TOTAL_PX;

// ── LEADERBOARD ───────────────────────────────────────────────────────────
let leaderboard = [];
let lbLoaded = false;
let nameEntry = { chars:['A','A','A'], pos:0, afterState:'title' };
const CHARS = ' ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

function fetchLeaderboard(){
  fetch('/api/trench-run').then(r=>r.json()).then(rows=>{
    leaderboard = rows;
    if(rows.length) highScore = rows[0].score;
    lbLoaded = true;
  }).catch(()=>{ lbLoaded = true; });
}
fetchLeaderboard();

function isHighScore(s){ return leaderboard.length<5 || s>leaderboard[leaderboard.length-1].score; }

function beginNameEntry(afterSt){
  nameEntry = { chars:['A','A','A'], pos:0, afterState:afterSt };
  state='enter_name';
}

function confirmName(){
  const name = nameEntry.chars.join('').trim()||'???';
  state='leaderboard';
  fetch('/api/trench-run', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name, score})
  }).then(r=>r.json()).then(rows=>{
    leaderboard = rows;
    if(rows.length) highScore = rows[0].score;
  }).catch(()=>{});
}

// ── PLAYER ───────────────────────────────────────────────────────────────
const PL = {
  x:160, y:H/2, vy:0,
  hp:180, maxHp:180,
  inv:0, // invincibility frames
  shotCD:0
};

// ── OBJECTS ──────────────────────────────────────────────────────────────
let bullets=[], eBullets=[], enemies=[], turrets=[], parts=[], stars=[];
let exhaustActive=false, exhaustX=0, exhaustHp=8, exhaustDead=false;
let winTimer=0;
let enemyTimer=0;
let vader=null, vaderSpawned=false;
let falconSaved=false;
let cine=null;
let hanSave=null;

// ── INPUT ─────────────────────────────────────────────────────────────────
const K={};
document.addEventListener('keydown',e=>{
  resumeAC();
  K[e.key]=true;
  if(e.key===' ') e.preventDefault();

  if(state==='enter_name'){
    const ci = CHARS.indexOf(nameEntry.chars[nameEntry.pos]);
    if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){
      nameEntry.chars[nameEntry.pos] = CHARS[(ci+1)%CHARS.length];
    } else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){
      nameEntry.chars[nameEntry.pos] = CHARS[(ci-1+CHARS.length)%CHARS.length];
    } else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){
      nameEntry.pos = Math.min(2, nameEntry.pos+1);
    } else if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){
      nameEntry.pos = Math.max(0, nameEntry.pos-1);
    } else if(e.key==='Enter'||e.key===' '){
      if(nameEntry.pos<2){ nameEntry.pos++; }
      else { confirmName(); }
    }
    return;
  }

  if(state==='leaderboard'){
    if(e.key==='Enter'||e.key===' ') state='title';
    return;
  }

  if(e.key==='Enter'||e.key===' '){
    if(state==='title') startGame();
    else if(state==='dead'||state==='win') state='title';
  }

  if(e.key==='l'||e.key==='L'){
    if(state==='title') state='leaderboard';
  }
});
document.addEventListener('keyup',e=>{ K[e.key]=false; });

// ── INIT ──────────────────────────────────────────────────────────────────
function initStars(){
  stars=[];
  for(let i=0;i<120;i++){
    stars.push({x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.5+0.3, spd:Math.random()*1.5+0.5});
  }
}

function placeTurrets(){
  turrets=[];
  const n=65;
  for(let i=0;i<n;i++){
    const p = 600 + (TOTAL_DIST/SEG)*(i/n)*SEG + Math.random()*200;
    turrets.push({
      tp: p, // trench pixel position
      side: Math.random()<0.5?'top':'bot',
      hp: 2,
      cd: Math.floor(Math.random()*120)+80,
      dead: false
    });
  }
}

function startGame(){
  state='playing'; frame=0; dist=0; score=0; spd=1;
  PL.x=160; PL.y=H/2; PL.vy=0; PL.hp=180; PL.inv=120; PL.shotCD=0; // 2s start invincibility
  bullets=[]; eBullets=[]; enemies=[]; parts=[];
  exhaustActive=false; exhaustX=0; exhaustHp=8; exhaustDead=false; winTimer=0;
  enemyTimer=0;
  vader=null; vaderSpawned=false;
  falconSaved=false;
  cine=null; hanSave=null;
  stopMusic(); startMusic();
  generateTrench();
  initStars();
  placeTurrets();
}

// ── PARTICLES ─────────────────────────────────────────────────────────────
function explode(x,y,big){
  const n=big?45:18;
  const cols=['#ff4400','#ff8800','#ffcc00','#ffffff','#ff2200','#ffaa00'];
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*(big?7:4)+1;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1, dec:0.015+Math.random()*0.025,
      sz:Math.random()*(big?6:3)+1,
      col:cols[Math.floor(Math.random()*cols.length)]});
  }
}

function spark(x,y){
  for(let i=0;i<6;i++){
    const a=Math.random()*Math.PI*2, s=Math.random()*3+1;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,
      life:1,dec:0.12,sz:1.5,col:'#ffcc66'});
  }
}

// ── UPDATE ────────────────────────────────────────────────────────────────
function damage(amt){
  if(PL.inv>0) return;
  const threshold=Math.ceil(PL.maxHp*0.05);
  // Han save: any hit that would drop us to/below 5% after Vader spawns
  if(!falconSaved && PL.hp-amt<=threshold){
    PL.hp=threshold; PL.inv=9999;
    sfxHit();
    triggerHanSave();
    return;
  }
  PL.hp-=amt; PL.inv=70;
  sfxHit();
  if(PL.hp<=0){
    PL.hp=0; explode(PL.x,PL.y,true); sfxExplode(true);
    highScore=Math.max(highScore,score);
    stopMusic();
    setTimeout(()=>{ if(isHighScore(score)) beginNameEntry('dead'); else state='dead'; },1200);
  }
}

function update(){
  if(state!=='playing') return;
  updateMusic();

  // Speed ramps from 1→3 over the run
  spd = 1 + (dist/TOTAL_DIST)*2;
  dist += spd;

  // Stars
  for(const s of stars){
    s.x -= s.spd+spd*0.25;
    if(s.x<0){ s.x=W; s.y=Math.random()*H; }
  }

  // Player movement
  const thrust=0.38, maxVy=5.5;
  if(K['w']||K['W']||K['ArrowUp']) PL.vy-=thrust;
  else if(K['s']||K['S']||K['ArrowDown']) PL.vy+=thrust;
  else PL.vy*=0.90;
  PL.vy=Math.max(-maxVy,Math.min(maxVy,PL.vy));
  PL.y+=PL.vy;

  // Wall collision
  const seg=getTrench(PL.x);
  if(PL.y<seg.top+14){ PL.y=seg.top+14; PL.vy=Math.abs(PL.vy)*0.3; damage(5); }
  if(PL.y>seg.bot-14){ PL.y=seg.bot-14; PL.vy=-Math.abs(PL.vy)*0.3; damage(5); }

  // Shoot
  if(PL.shotCD>0) PL.shotCD--;
  if((K[' ']||K['Space'])&&PL.shotCD<=0&&PL.hp>0){
    bullets.push({x:PL.x+30,y:PL.y-9,vx:16,vy:0});
    bullets.push({x:PL.x+30,y:PL.y+9,vx:16,vy:0});
    sfxShoot();
    PL.shotCD=10;
  }

  if(PL.inv>0) PL.inv--;

  // Player bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx; b.y+=b.vy;
    if(b.x>W+20){ bullets.splice(i,1); continue; }
    const ws=getTrench(b.x);
    if(b.y<ws.top||b.y>ws.bot){ spark(b.x,b.y); bullets.splice(i,1); }
  }

  // Enemy bullets
  for(let i=eBullets.length-1;i>=0;i--){
    const b=eBullets[i];
    b.x+=b.vx; b.y+=b.vy;
    if(b.x<-20||b.x>W+20||b.y<0||b.y>H){ eBullets.splice(i,1); continue; }
    if(Math.abs(b.x-PL.x)<22&&Math.abs(b.y-PL.y)<14){
      damage(b.dmg||8); spark(b.x,b.y); eBullets.splice(i,1);
    }
  }

  // Enemies (TIE fighters)
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    e.x+=e.vx; e.y+=e.vy;
    // Bounce in trench
    const ws=getTrench(e.x);
    if(e.y<ws.top+28){ e.y=ws.top+28; e.vy=Math.abs(e.vy); }
    if(e.y>ws.bot-28){ e.y=ws.bot-28; e.vy=-Math.abs(e.vy); }
    if(e.x<-80){ enemies.splice(i,1); continue; }

    // Enemy shoot
    if(e.cd>0) e.cd--;
    else{
      const dx=PL.x-e.x, dy=PL.y-e.y, dd=Math.sqrt(dx*dx+dy*dy);
      if(dd<500){
        const sp=6;
        eBullets.push({x:e.x,y:e.y,vx:dx/dd*sp,vy:dy/dd*sp});
        sfxEnemyShoot();
        e.cd=110+Math.random()*70|0;
      }
    }

    // Collide with player
    if(Math.abs(e.x-PL.x)<38&&Math.abs(e.y-PL.y)<22){
      damage(18); explode(e.x,e.y,true); sfxExplode(true);
      enemies.splice(i,1); continue;
    }

    // Hit by player bullets
    let hit=false;
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(Math.abs(b.x-e.x)<32&&Math.abs(b.y-e.y)<20){
        e.hp--; bullets.splice(j,1); spark(b.x,b.y);
        if(e.hp<=0){
          score+=100; explode(e.x,e.y,true); sfxExplode(true);
          PL.hp=Math.min(PL.hp+(PL.maxHp-PL.hp)*0.10,PL.maxHp);
          enemies.splice(i,1); hit=true; break;
        }
      }
    }
    if(hit) continue;
  }

  // Turrets
  for(const t of turrets){
    const sx=t.tp-dist; // screen X
    if(sx<-60||sx>W+60) continue;
    if(t.dead) continue;

    const ws=getTrench(sx);
    const ty=t.side==='top'?ws.top+8:ws.bot-8;

    // Shoot
    if(t.cd>0) t.cd--;
    else{
      const dx=PL.x-sx, dy=PL.y-ty, dd=Math.sqrt(dx*dx+dy*dy);
      if(dd<470){
        const sp=5;
        eBullets.push({x:sx,y:ty,vx:dx/dd*sp,vy:dy/dd*sp});
        sfxEnemyShoot();
        t.cd=95+Math.random()*45|0;
      }
    }

    // Hit by player bullets
    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(Math.abs(b.x-sx)<14&&Math.abs(b.y-ty)<14){
        t.hp--; bullets.splice(j,1); spark(b.x,b.y);
        if(t.hp<=0){ t.dead=true; score+=50; explode(sx,ty,false); sfxExplode(false); PL.hp=Math.min(PL.hp+(PL.maxHp-PL.hp)*0.05,PL.maxHp); }
        break;
      }
    }
  }

  // Exhaust port logic
  const prog=dist/TOTAL_DIST;
  if(prog>=0.92&&!exhaustActive){
    exhaustActive=true; exhaustX=W+60; exhaustHp=8;
  }
  if(exhaustActive&&!exhaustDead){
    exhaustX-=spd;
    if(exhaustX<-80){ exhaustX=W+60; } // loops until destroyed

    const ws=getTrench(exhaustX);
    const ey=(ws.top+ws.bot)/2;

    for(let j=bullets.length-1;j>=0;j--){
      const b=bullets[j];
      if(Math.abs(b.x-exhaustX)<18&&Math.abs(b.y-ey)<18){
        exhaustHp--; bullets.splice(j,1); spark(b.x,b.y);
        if(exhaustHp<=0){
          exhaustDead=true;
          explode(exhaustX,ey,true);
          setTimeout(()=>explode(exhaustX+30,ey-20,true),300);
          setTimeout(()=>explode(exhaustX-20,ey+30,true),600);
          sfxExplode(true); sfxWin(); stopMusic();
          score+=1000;
          highScore=Math.max(highScore,score);
          setTimeout(()=>startCinematic(), 800);
        }
        break;
      }
    }
  }

  // Particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.96; p.vy*=0.96; p.vy+=0.04;
    p.life-=p.dec;
    if(p.life<=0) parts.splice(i,1);
  }

  // Vader boss
  if(!vaderSpawned && dist/TOTAL_DIST>=0.30 && !exhaustActive){
    vaderSpawned=true;
    vader={x:W+90, y:PL.y, vx:-1.3, vy:0, hp:8, cd:80, targetX:420};
    shiftMusicVader();
  }
  // Scripted Han save — guaranteed at 85% regardless of HP
  if(vaderSpawned && !falconSaved && dist/TOTAL_DIST>=0.85){
    triggerHanSave();
  }
  if(vader){
    if(vader.x>vader.targetX) vader.x+=vader.vx;
    const vdDy=PL.y-vader.y; vader.vy+=vdDy*0.012; vader.vy*=0.90; vader.y+=vader.vy;
    const vws=getTrench(vader.x);
    if(vader.y<vws.top+32){ vader.y=vws.top+32; vader.vy=Math.abs(vader.vy); }
    if(vader.y>vws.bot-32){ vader.y=vws.bot-32; vader.vy=-Math.abs(vader.vy); }
    if(vader.cd>0) vader.cd--;
    else{
      const vdx=PL.x-vader.x, vdy=PL.y-vader.y, vdd=Math.sqrt(vdx*vdx+vdy*vdy);
      if(vdd<700){
        const sp=7;
        eBullets.push({x:vader.x,y:vader.y,vx:vdx/vdd*sp,vy:vdy/vdd*sp,dmg:13});
        sfxEnemyShoot();
        vader.cd=32+Math.random()*20|0;
      }
    }
    if(Math.abs(vader.x-PL.x)<40&&Math.abs(vader.y-PL.y)<24){
      damage(20); // Vader is invincible — stays in pursuit
    }
    // Vader is invincible — bullets just deflect
    if(vader){
      for(let j=bullets.length-1;j>=0;j--){
        const b=bullets[j];
        if(Math.abs(b.x-vader.x)<32&&Math.abs(b.y-vader.y)<20){
          bullets.splice(j,1); spark(b.x,b.y); spark(b.x+4,b.y-4);
          break;
        }
      }
    }
  }

  // Spawn enemies
  enemyTimer--;
  if(enemyTimer<=0&&dist>400&&!exhaustActive){
    const ep=dist/TOTAL_DIST;
    const interval=Math.max(55,170-ep*110)|0;
    enemyTimer=interval+Math.random()*interval*0.5|0;
    const ws=getTrench(W+60);
    const mid=(ws.top+ws.bot)/2, half=(ws.bot-ws.top)*0.35;
    const ey=mid+(Math.random()-0.5)*half*2;
    enemies.push({
      x:W+60,
      y:Math.max(ws.top+30,Math.min(ws.bot-30,ey)),
      vx:-(1.2+ep*2+Math.random()*0.5),
      vy:(Math.random()-0.5)*1.2,
      hp:1+Math.floor(ep*1.5),
      cd:60+Math.random()*50|0
    });
  }
}

// ── DRAW HELPERS ──────────────────────────────────────────────────────────
function glow(color,blur){ ctx.shadowColor=color; ctx.shadowBlur=blur; }
function noGlow(){ ctx.shadowBlur=0; }

function drawXWing(x,y,flash){
  if(flash===undefined) flash=PL.inv>0&&PL.inv%4<2;
  if(flash){ ctx.globalAlpha=0.4; }

  // Dual engine glows (two nacelles)
  for(const oy of [-9,9]){
    const eg=ctx.createRadialGradient(x-26,y+oy,0,x-26,y+oy,13);
    eg.addColorStop(0,'rgba(100,200,255,0.95)');
    eg.addColorStop(1,'rgba(0,40,200,0)');
    ctx.fillStyle=eg;
    ctx.beginPath(); ctx.arc(x-26,y+oy,11+Math.sin(frame*0.2)*1.5,0,Math.PI*2); ctx.fill();
  }

  // === WINGS — draw behind fuselage ===
  // Top-front wing
  ctx.fillStyle='#b0b0b0';
  ctx.beginPath();
  ctx.moveTo(x+10,y-4); ctx.lineTo(x-2,y-33); ctx.lineTo(x-18,y-31); ctx.lineTo(x-3,y-5);
  ctx.closePath(); ctx.fill();
  // Bot-front wing
  ctx.beginPath();
  ctx.moveTo(x+10,y+4); ctx.lineTo(x-2,y+33); ctx.lineTo(x-18,y+31); ctx.lineTo(x-3,y+5);
  ctx.closePath(); ctx.fill();
  // Top-rear wing (darker)
  ctx.fillStyle='#909090';
  ctx.beginPath();
  ctx.moveTo(x-3,y-5); ctx.lineTo(x-18,y-31); ctx.lineTo(x-32,y-28); ctx.lineTo(x-32,y-4);
  ctx.closePath(); ctx.fill();
  // Bot-rear wing
  ctx.beginPath();
  ctx.moveTo(x-3,y+5); ctx.lineTo(x-18,y+31); ctx.lineTo(x-32,y+28); ctx.lineTo(x-32,y+4);
  ctx.closePath(); ctx.fill();

  // Red wing stripes
  ctx.fillStyle='#cc3300';
  ctx.fillRect(x-21,y-31,17,3);
  ctx.fillRect(x-21,y+28,17,3);

  // Laser cannons — 4 tubes, one at each wingtip
  ctx.fillStyle='#666';
  ctx.fillRect(x-2,y-34,36,2.5);   // top-front tip → past nose
  ctx.fillRect(x-2,y+32,36,2.5);   // bot-front tip → past nose
  ctx.fillRect(x-32,y-30,26,2.5);  // top-rear tip
  ctx.fillRect(x-32,y+28,26,2.5);  // bot-rear tip

  // Engine nacelle blocks
  ctx.fillStyle='#777';
  ctx.fillRect(x-34,y-12,10,7);
  ctx.fillRect(x-34,y+5,10,7);

  // === FUSELAGE ===
  ctx.fillStyle='#d2d2d2';
  ctx.beginPath();
  ctx.moveTo(x+36,y);        // nose tip
  ctx.lineTo(x+22,y-4);
  ctx.lineTo(x-2,y-4);
  ctx.lineTo(x-22,y-5);
  ctx.lineTo(x-32,y-3);
  ctx.lineTo(x-32,y+3);
  ctx.lineTo(x-22,y+5);
  ctx.lineTo(x-2,y+4);
  ctx.lineTo(x+22,y+4);
  ctx.closePath(); ctx.fill();

  // Fuselage darker top panel
  ctx.fillStyle='#b8b8b8';
  ctx.beginPath();
  ctx.moveTo(x+34,y); ctx.lineTo(x+20,y-4); ctx.lineTo(x-20,y-4); ctx.lineTo(x-30,y-2);
  ctx.lineTo(x-30,y); ctx.lineTo(x-20,y-1); ctx.lineTo(x+20,y-1); ctx.closePath(); ctx.fill();

  // Cockpit canopy
  ctx.fillStyle='#6aacdc';
  ctx.beginPath(); ctx.ellipse(x+16,y-6,13,7,-0.18,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.28)';
  ctx.beginPath(); ctx.ellipse(x+13,y-9,6,3,-0.18,0,Math.PI*2); ctx.fill();

  // R2-D2 dome (behind cockpit)
  ctx.fillStyle='#ccddf0';
  ctx.beginPath(); ctx.arc(x+1,y-6,5,Math.PI,0); ctx.fill();
  ctx.fillStyle='#2255aa';
  ctx.beginPath(); ctx.arc(x+1,y-6,3,Math.PI,0); ctx.fill();

  ctx.globalAlpha=1;
}

function drawTIE(x,y){
  // Ball cockpit
  ctx.fillStyle='#555'; ctx.strokeStyle='#888'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(x,y,13,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // Window
  ctx.fillStyle='#001a44';
  ctx.beginPath(); ctx.arc(x+2,y,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0033aa';
  ctx.beginPath(); ctx.arc(x+2,y,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(100,160,255,0.4)';
  ctx.beginPath(); ctx.arc(x+1,y-2,2,0,Math.PI*2); ctx.fill();

  // Struts
  ctx.fillStyle='#666';
  ctx.fillRect(x-32,y-2.5,20,5);
  ctx.fillRect(x+12,y-2.5,20,5);

  // Left wing
  ctx.fillStyle='#3a3a3a'; ctx.strokeStyle='#666'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(x-32,y-32); ctx.lineTo(x-50,y-16); ctx.lineTo(x-50,y+16);
  ctx.lineTo(x-32,y+32); ctx.lineTo(x-22,y+16); ctx.lineTo(x-22,y-16);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // Right wing
  ctx.beginPath();
  ctx.moveTo(x+32,y-32); ctx.lineTo(x+50,y-16); ctx.lineTo(x+50,y+16);
  ctx.lineTo(x+32,y+32); ctx.lineTo(x+22,y+16); ctx.lineTo(x+22,y-16);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // Wing panels
  ctx.strokeStyle='#555'; ctx.lineWidth=0.5;
  for(let r=-2;r<=2;r++){
    ctx.beginPath(); ctx.moveTo(x-36+r*4,y-30); ctx.lineTo(x-36+r*4,y+30); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+36+r*4,y-30); ctx.lineTo(x+36+r*4,y+30); ctx.stroke();
  }
}

function drawTurret(x,y,side,dead){
  const down=side==='top';
  ctx.fillStyle=dead?'#333':'#505060';
  // Base block
  ctx.fillRect(x-9, down?y:y-14, 18, 14);
  // Barrel
  ctx.fillStyle=dead?'#282828':'#707080';
  ctx.fillRect(x-3, down?y+12:y-26, 6, 14);
  // Tip
  ctx.fillStyle=dead?'#222':'#888';
  ctx.fillRect(x-2, down?y+24:y-30, 4, 6);
  // Warning light
  if(!dead){
    const pulse=0.5+0.5*Math.sin(frame*0.15);
    glow('#ff3300',10);
    ctx.fillStyle=`rgba(255,60,0,${pulse})`;
    ctx.beginPath(); ctx.arc(x, down?y+6:y-6, 4, 0, Math.PI*2); ctx.fill();
    noGlow();
  }
}

function drawVader(x,y){
  // TIE Advanced x1 — angular bent wings, red cockpit
  ctx.fillStyle='#222'; ctx.strokeStyle='#445'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(x,y,13,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#1a0005';
  ctx.beginPath(); ctx.arc(x+2,y,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#770011';
  ctx.beginPath(); ctx.arc(x+2,y,5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,60,60,0.5)';
  ctx.beginPath(); ctx.arc(x+1,y-2,2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#333';
  ctx.fillRect(x-32,y-2.5,20,5); ctx.fillRect(x+12,y-2.5,20,5);
  // Swept/bent wings
  ctx.fillStyle='#2a2a3a'; ctx.strokeStyle='#556'; ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(x-32,y-18); ctx.lineTo(x-55,y-8); ctx.lineTo(x-58,y+8);
  ctx.lineTo(x-32,y+18); ctx.lineTo(x-22,y+10); ctx.lineTo(x-26,y);
  ctx.lineTo(x-22,y-10); ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x+32,y-18); ctx.lineTo(x+55,y-8); ctx.lineTo(x+58,y+8);
  ctx.lineTo(x+32,y+18); ctx.lineTo(x+22,y+10); ctx.lineTo(x+26,y);
  ctx.lineTo(x+22,y-10); ctx.closePath(); ctx.fill(); ctx.stroke();
  // Wing panel lines
  ctx.strokeStyle='#3a3a55'; ctx.lineWidth=0.8;
  for(const ox of [-1,1]){
    for(const dy of [-10,0,10]){
      ctx.beginPath(); ctx.moveTo(x+ox*30,y+dy); ctx.lineTo(x+ox*50,y+dy*0.5); ctx.stroke();
    }
  }
  // Red pulsing aura — strong so it's clearly visible
  const pulse=0.4+0.4*Math.sin(frame*0.14);
  glow('#ff0000',30);
  ctx.strokeStyle=`rgba(255,0,0,${pulse})`;
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(x,y,18,0,Math.PI*2); ctx.stroke();
  glow('#ff0000',12);
  ctx.strokeStyle=`rgba(255,80,0,${pulse*0.6})`;
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(x,y,28,0,Math.PI*2); ctx.stroke();
  noGlow();
}

function drawFalcon(x,y){
  // Millennium Falcon flying LEFT — front faces left
  const eg=ctx.createRadialGradient(x+36,y,0,x+36,y,22);
  eg.addColorStop(0,'rgba(80,180,255,0.9)');
  eg.addColorStop(1,'rgba(0,40,200,0)');
  ctx.fillStyle=eg;
  ctx.beginPath(); ctx.arc(x+36,y,18+Math.sin(frame*0.2)*2,0,Math.PI*2); ctx.fill();
  // Main disc
  ctx.fillStyle='#aaa';
  ctx.beginPath(); ctx.ellipse(x,y,40,22,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#999';
  ctx.beginPath(); ctx.ellipse(x-4,y,30,15,0,0,Math.PI*2); ctx.fill();
  // Forward mandibles (pointing left)
  ctx.fillStyle='#888';
  ctx.beginPath();
  ctx.moveTo(x-20,y-7); ctx.lineTo(x-46,y-3); ctx.lineTo(x-46,y-11); ctx.lineTo(x-22,y-14);
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(x-20,y+7); ctx.lineTo(x-46,y+3); ctx.lineTo(x-46,y+11); ctx.lineTo(x-22,y+14);
  ctx.closePath(); ctx.fill();
  // Cockpit (top)
  ctx.fillStyle='#7ab8f5';
  ctx.beginPath(); ctx.arc(x+8,y-14,8,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath(); ctx.arc(x+6,y-16,3,0,Math.PI*2); ctx.fill();
  // Panel detail
  ctx.strokeStyle='#777'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.ellipse(x-6,y,16,9,0.15,0,Math.PI*2); ctx.stroke();
}

function drawExhaustPort(x){
  if(exhaustDead) return;
  const ws=getTrench(x);
  const ey=(ws.top+ws.bot)/2;
  const r=20;
  const hp=exhaustHp/8;

  glow('#ff6600',25);
  // Outer ring
  ctx.strokeStyle=`hsl(${hp*30},100%,55%)`;
  ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(x,ey,r,0,Math.PI*2); ctx.stroke();
  // Inner ring
  ctx.strokeStyle=`hsl(${hp*30},80%,35%)`;
  ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(x,ey,r*0.6,0,Math.PI*2); ctx.stroke();
  // Fill
  ctx.fillStyle='#110500';
  ctx.beginPath(); ctx.arc(x,ey,r-3,0,Math.PI*2); ctx.fill();
  // Center
  ctx.fillStyle=`hsl(${hp*30},100%,50%)`;
  ctx.beginPath(); ctx.arc(x,ey,6,0,Math.PI*2); ctx.fill();
  noGlow();

  // Label
  ctx.fillStyle='#ff6600';
  ctx.font='bold 11px Courier New';
  ctx.textAlign='center';
  ctx.fillText('EXHAUST PORT',x,ey-r-8);
  ctx.fillText(`[${exhaustHp}/8]`,x,ey-r-20);
  ctx.textAlign='left';

  // Arrows pointing at it
  const t=Math.sin(frame*0.1)*5;
  ctx.fillStyle='#ff6600';
  ctx.font='18px monospace';
  ctx.textAlign='center';
  ctx.fillText('►',x-r-20+t,ey+6);
  ctx.textAlign='left';
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  // Background
  ctx.fillStyle='#00010a';
  ctx.fillRect(0,0,W,H);

  // Stars
  for(const s of stars){
    ctx.globalAlpha=0.4+s.r*0.3;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r*0.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Trench walls
  // Build top/bottom paths
  ctx.fillStyle='#18181f';
  ctx.beginPath();
  ctx.moveTo(0,0);
  for(let x=0;x<=W;x+=SEG){
    ctx.lineTo(x, getTrench(x).top);
  }
  ctx.lineTo(W,0);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=SEG){
    ctx.lineTo(x, getTrench(x).bot);
  }
  ctx.lineTo(W,H);
  ctx.closePath();
  ctx.fill();

  // Wall texture stripes (vertical panel lines, scroll with distance)
  ctx.strokeStyle='#23232f';
  ctx.lineWidth=1;
  const panelW=50;
  const offset=(dist*0.8)%panelW;
  for(let x=-offset; x<W+panelW; x+=panelW){
    const seg=getTrench(x);
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,seg.top); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,seg.bot); ctx.lineTo(x,H); ctx.stroke();
  }

  // Horizontal seam lines on walls
  for(let y=0;y<H;y+=30){
    const lineY=y-((dist*0.3)%30);
    ctx.strokeStyle='#1f1f2a';
    ctx.beginPath(); ctx.moveTo(0,lineY); ctx.lineTo(W,lineY); ctx.stroke();
  }

  // Wall edge glow
  glow('#003366',12);
  ctx.strokeStyle='#224466';
  ctx.lineWidth=2;
  ctx.beginPath();
  for(let x=0;x<=W;x+=SEG){
    const seg=getTrench(x);
    x===0?ctx.moveTo(x,seg.top):ctx.lineTo(x,seg.top);
  }
  ctx.stroke();
  ctx.beginPath();
  for(let x=0;x<=W;x+=SEG){
    const seg=getTrench(x);
    x===0?ctx.moveTo(x,seg.bot):ctx.lineTo(x,seg.bot);
  }
  ctx.stroke();
  noGlow();

  // Exhaust port
  if(exhaustActive) drawExhaustPort(exhaustX);

  // Turrets
  for(const t of turrets){
    const sx=t.tp-dist;
    if(sx<-50||sx>W+50) continue;
    const ws=getTrench(sx);
    const ty=t.side==='top'?ws.top:ws.bot;
    drawTurret(sx,ty,t.side,t.dead);
  }

  // Enemies
  for(const e of enemies){
    drawTIE(e.x,e.y);
  }

  // Vader
  if(vader) drawVader(vader.x,vader.y);

  // Player bullets
  glow('#00ff44',10);
  ctx.fillStyle='#44ff88';
  for(const b of bullets){
    ctx.fillRect(b.x-10,b.y-2,20,4);
  }
  noGlow();

  // Enemy bullets
  glow('#ff2200',10);
  ctx.fillStyle='#ff4422';
  for(const b of eBullets){
    ctx.fillRect(b.x-8,b.y-2,16,4);
  }
  noGlow();

  // Particles
  for(const p of parts){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Player ship
  if(PL.hp>0) drawXWing(PL.x,PL.y);

  // HUD
  renderHUD();
}

function renderHUD(){
  const prog=Math.min(1,dist/TOTAL_DIST);

  // Health bar
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(15,H-38,210,18);
  const hpPct=PL.hp/PL.maxHp;
  const hpCol=hpPct>0.5?'#22ff66':hpPct>0.25?'#ffaa00':'#ff2200';
  ctx.fillStyle=hpCol; ctx.fillRect(15,H-38,210*hpPct,18);
  ctx.strokeStyle='#44ff88'; ctx.lineWidth=1; ctx.strokeRect(15,H-38,210,18);
  ctx.fillStyle='#fff'; ctx.font='10px Courier New';
  ctx.fillText('SHIELDS',17,H-25);

  // Distance meter
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(W-225,H-38,210,18);
  ctx.fillStyle='#2266ff'; ctx.fillRect(W-225,H-38,210*prog,18);
  ctx.strokeStyle='#2266ff'; ctx.lineWidth=1; ctx.strokeRect(W-225,H-38,210,18);
  ctx.fillStyle='#fff'; ctx.font='10px Courier New';
  ctx.fillText('TRENCH',W-223,H-25);

  // Score
  ctx.fillStyle='#ffcc00'; ctx.font='bold 16px Courier New';
  ctx.textAlign='center';
  ctx.fillText(`SCORE: ${score}`,W/2,22);
  ctx.textAlign='left';

  // Enemy count indicator
  if(enemies.length>0){
    ctx.fillStyle='#ff4444'; ctx.font='bold 11px Courier New';
    ctx.textAlign='center';
    ctx.fillText(`⚠ ${enemies.length} TIE FIGHTER${enemies.length>1?'S':''}`,W/2,42);
    ctx.textAlign='left';
  }

  // Near-wall warning
  const ws=getTrench(PL.x);
  if(PL.y-ws.top<35||ws.bot-PL.y<35){
    const pulse=Math.sin(frame*0.25)>0;
    if(pulse){
      glow('#ff2200',15);
      ctx.fillStyle='#ff2200'; ctx.font='bold 13px Courier New';
      ctx.textAlign='center';
      ctx.fillText('▲ PULL UP ▲',W/2,H/2-50);
      ctx.textAlign='left';
      noGlow();
    }
  }

  // Vader warning
  if(vader && Math.sin(frame*0.18)>0){
    glow('#ff0000',18);
    ctx.fillStyle='#ff2200'; ctx.font='bold 13px Courier New';
    ctx.textAlign='center';
    ctx.fillText('⚠  VADER ON YOUR TAIL  ⚠',W/2,H/2-70);
    ctx.textAlign='left';
    noGlow();
  }

  // Exhaust port incoming warning
  if(exhaustActive&&!exhaustDead&&exhaustX>W){
    const pulse=Math.sin(frame*0.15)>0;
    if(pulse){
      glow('#ff6600',15);
      ctx.fillStyle='#ff6600'; ctx.font='bold 14px Courier New';
      ctx.textAlign='center';
      ctx.fillText('► EXHAUST PORT AHEAD — FIRE!',W/2,60);
      ctx.textAlign='left';
      noGlow();
    }
  }
}

function renderTitle(){
  ctx.fillStyle='rgba(0,0,20,0.88)'; ctx.fillRect(0,0,W,H);

  // Crawl effect lines
  ctx.fillStyle='#111122';
  for(let i=0;i<10;i++){
    ctx.fillRect(0,((frame*0.5+i*50)%H),W,2);
  }

  glow('#ffcc00',30);
  ctx.fillStyle='#ffdd00'; ctx.font='bold 70px Courier New';
  ctx.textAlign='center';
  ctx.fillText('TRENCH RUN',W/2,H/2-90);
  noGlow();

  ctx.fillStyle='#8888aa'; ctx.font='16px Courier New';
  ctx.fillText('A DEATH STAR ASSAULT',W/2,H/2-50);

  ctx.fillStyle='#cccccc'; ctx.font='14px Courier New';
  ctx.fillText('W  /  S        ─  Move Up / Down',W/2,H/2+0);
  ctx.fillText('SPACE          ─  Fire Lasers',W/2,H/2+22);
  ctx.fillText('Destroy turrets, shoot down TIE fighters',W/2,H/2+44);
  ctx.fillText('Find the exhaust port and fire into it!',W/2,H/2+66);

  glow('#00ff88',10);
  ctx.fillStyle='#00ff88'; ctx.font='bold 20px Courier New';
  if(Math.sin(frame*0.06)>0) ctx.fillText('PRESS ENTER OR SPACE',W/2,H/2+112);
  noGlow();

  if(leaderboard.length>0){
    ctx.fillStyle='#ffcc00'; ctx.font='14px Courier New';
    ctx.fillText(`HIGH SCORE: ${leaderboard[0].score}  ${leaderboard[0].name}`,W/2,H/2+148);
  }
  ctx.fillStyle='#444'; ctx.font='13px Courier New';
  ctx.fillText('L — LEADERBOARD',W/2,H/2+178);

  ctx.textAlign='left';
}

function renderDead(){
  ctx.fillStyle='rgba(0,0,0,0.78)'; ctx.fillRect(0,0,W,H);
  glow('#ff0000',30);
  ctx.fillStyle='#ff2200'; ctx.font='bold 52px Courier New';
  ctx.textAlign='center';
  ctx.fillText('SHIP DESTROYED',W/2,H/2-70);
  noGlow();
  ctx.fillStyle='#aaa'; ctx.font='16px Courier New';
  ctx.fillText('The Rebellion has failed...',W/2,H/2-30);
  ctx.fillStyle='#fff'; ctx.font='bold 22px Courier New';
  ctx.fillText(`SCORE: ${score}`,W/2,H/2+10);
  if(highScore>0){ ctx.fillStyle='#ffcc00'; ctx.font='14px Courier New'; ctx.fillText(`HIGH SCORE: ${highScore}`,W/2,H/2+38); }
  ctx.fillStyle='#00ff88'; ctx.font='bold 16px Courier New';
  if(Math.sin(frame*0.07)>0) ctx.fillText('PRESS ENTER OR SPACE TO RETRY',W/2,H/2+82);
  ctx.textAlign='left';
}

}

function renderNameEntry(){
  ctx.fillStyle='rgba(0,0,0,0.88)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';

  glow('#ffcc00',20);
  ctx.fillStyle='#ffcc00'; ctx.font='bold 36px Courier New';
  ctx.fillText('NEW HIGH SCORE!',W/2,H/2-110);
  noGlow();

  ctx.fillStyle='#fff'; ctx.font='bold 24px Courier New';
  ctx.fillText(`SCORE: ${score}`,W/2,H/2-68);

  ctx.fillStyle='#aaa'; ctx.font='16px Courier New';
  ctx.fillText('ENTER YOUR NAME',W/2,H/2-30);

  // 3-char name boxes
  const boxW=60, boxH=64, gap=14;
  const totalW=boxW*3+gap*2;
  const bx=W/2-totalW/2;
  const by=H/2-8;
  for(let i=0;i<3;i++){
    const x=bx+i*(boxW+gap);
    const active=i===nameEntry.pos;
    ctx.strokeStyle=active?'#ffcc00':'#555';
    ctx.lineWidth=active?3:1;
    ctx.strokeRect(x,by,boxW,boxH);
    if(active){ ctx.fillStyle='rgba(255,204,0,0.12)'; ctx.fillRect(x,by,boxW,boxH); }
    // blink cursor underline
    if(active && Math.sin(frame*0.12)>0){
      ctx.fillStyle='#ffcc00'; ctx.fillRect(x+8,by+boxH-8,boxW-16,3);
    }
    ctx.fillStyle=active?'#ffcc00':'#fff';
    ctx.font='bold 38px Courier New';
    ctx.fillText(nameEntry.chars[i],x+boxW/2,by+boxH-12);
  }

  ctx.fillStyle='#555'; ctx.font='13px Courier New';
  ctx.fillText('W/S or \u2191\u2193 to change  \u2190\u2192 to move  SPACE/ENTER to confirm',W/2,H/2+80);
  ctx.textAlign='left';
}

function renderLeaderboard(){
  ctx.fillStyle='rgba(0,0,0,0.92)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';

  glow('#ffcc00',20);
  ctx.fillStyle='#ffcc00'; ctx.font='bold 38px Courier New';
  ctx.fillText('HIGH SCORES',W/2,H/2-140);
  noGlow();

  ctx.fillStyle='#555'; ctx.font='14px Courier New';
  ctx.fillText('── TOP 5 ──',W/2,H/2-108);

  const colors=['#ffcc00','#cccccc','#cd7f32','#aaa','#888'];
  if(leaderboard.length===0){
    ctx.fillStyle='#555'; ctx.font='18px Courier New';
    ctx.fillText('NO SCORES YET',W/2,H/2-40);
  } else {
    leaderboard.forEach((entry,i)=>{
      const y = H/2-70+i*44;
      ctx.fillStyle=colors[i];
      ctx.font=`bold 22px Courier New`;
      const rank=['1ST','2ND','3RD','4TH','5TH'][i];
      const name=(entry.name||'???').toUpperCase().padEnd(3,' ');
      ctx.fillText(`${rank}  ${name}  ${String(entry.score).padStart(6,' ')}`,W/2,y);
    });
  }

  ctx.fillStyle='#00ff88'; ctx.font='bold 16px Courier New';
  if(Math.sin(frame*0.07)>0) ctx.fillText('PRESS ENTER OR SPACE',W/2,H/2+160);
  ctx.textAlign='left';
}

// ── HAN SAVE CUTAWAY ──────────────────────────────────────────────────────
function triggerHanSave(){
  falconSaved=true;
  stopMusic();
  // Save Vader's last position for the cutaway
  const vx=vader?vader.x:W*0.65, vy=vader?vader.y:H*0.5;
  vader=null;
  parts=[];
  hanSave={
    timer:0,
    vaderX:Math.min(vx,W*0.72), vaderY:vy,
    falcX:W+130, falcY:vy-20,
  };
  state='han_save';
}

function updateHanSave(){
  if(!hanSave) return;
  const t=hanSave.timer++;
  // Stars drift
  for(const s of stars){ s.x-=2; if(s.x<0){ s.x=W; s.y=Math.random()*H; } }
  // Falcon sweeps across
  hanSave.falcX-=5;
  // Spawn debris when Vader explodes
  if(t===130){ sfxExplode(true); explode(hanSave.vaderX,hanSave.vaderY,true); explode(hanSave.vaderX+20,hanSave.vaderY-15,true); }
  if(t===150) sfxExplode(false);
  // Update particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.vx*=0.97; p.vy*=0.97;
    p.life-=p.dec; if(p.life<=0) parts.splice(i,1);
  }
  // Resume game after cutaway
  if(t>=420){
    hanSave=null;
    state='playing';
    PL.hp=Math.ceil(PL.maxHp*0.05); // 5% hp
    PL.inv=200; // ~3.3s to get ready
    // Jump dist to just before exhaust port (leaving ~600px of trench)
    dist=TOTAL_DIST*0.885;
    exhaustActive=false; exhaustX=0; exhaustDead=false;
    vader=null; vaderSpawned=true; // don't re-spawn
    enemies=[]; eBullets=[];
    // Restart music in a tense mode
    startMusic(); shiftMusicVader();
  }
}

function renderHanSave(){
  if(!hanSave) return;
  const t=hanSave.timer;
  ctx.fillStyle='#00010a'; ctx.fillRect(0,0,W,H);
  // Stars
  for(const s of stars){
    ctx.globalAlpha=0.5+s.r*0.2; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r*0.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Vader (large, menacing) — visible until explosion
  if(t<131){
    ctx.save(); ctx.translate(hanSave.vaderX,hanSave.vaderY); ctx.scale(1.5,1.5);
    drawVader(0,0); ctx.restore();
  }
  // Vader locked-on targeting reticle
  if(t<110 && Math.sin(t*0.22)>0){
    glow('#ff0000',15);
    ctx.strokeStyle='#ff3300'; ctx.lineWidth=2;
    const r=48+Math.sin(t*0.1)*4;
    ctx.beginPath(); ctx.arc(hanSave.vaderX,hanSave.vaderY,r,0,Math.PI*2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(hanSave.vaderX-r-10,hanSave.vaderY); ctx.lineTo(hanSave.vaderX-r+8,hanSave.vaderY);
    ctx.moveTo(hanSave.vaderX+r-8,hanSave.vaderY); ctx.lineTo(hanSave.vaderX+r+10,hanSave.vaderY);
    ctx.moveTo(hanSave.vaderX,hanSave.vaderY-r-10); ctx.lineTo(hanSave.vaderX,hanSave.vaderY-r+8);
    ctx.moveTo(hanSave.vaderX,hanSave.vaderY+r-8); ctx.lineTo(hanSave.vaderX,hanSave.vaderY+r+10);
    ctx.stroke(); noGlow();
  }

  // Damaged X-Wing at left — barely holding together
  if(t<131){
    const flicker=Math.sin(t*0.7)>-0.3;
    if(flicker){ ctx.globalAlpha=0.5+0.5*Math.random(); drawXWing(160,H*0.52,false); ctx.globalAlpha=1; }
    // Damage sparks
    if(t%6===0) spark(160+(Math.random()-0.5)*20, H*0.52+(Math.random()-0.5)*20);
  }

  // Falcon sweeps in from right
  if(t>45&&hanSave.falcX>-160){
    ctx.save(); ctx.translate(hanSave.falcX,hanSave.falcY); ctx.scale(-1,1);
    drawFalcon(0,0); ctx.restore();
  }

  // Vader explosion
  if(t>=130&&t<240){
    const et=t-130, r=Math.min(et*3.5,90), a=Math.max(0,1-et/100);
    ctx.globalAlpha=a;
    const mg=ctx.createRadialGradient(hanSave.vaderX,hanSave.vaderY,0,hanSave.vaderX,hanSave.vaderY,r);
    mg.addColorStop(0,'#ffffff'); mg.addColorStop(0.25,'#ffffaa');
    mg.addColorStop(0.55,'#ff8800'); mg.addColorStop(1,'rgba(255,30,0,0)');
    ctx.fillStyle=mg; ctx.beginPath(); ctx.arc(hanSave.vaderX,hanSave.vaderY,r,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
  // Debris particles
  for(const p of parts){
    ctx.globalAlpha=p.life; ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // Text overlays
  if(t>70&&t<131&&Math.sin(t*0.14)>0){
    glow('#ff2200',12); ctx.fillStyle='#ff3300'; ctx.font='bold 15px Courier New';
    ctx.textAlign='center'; ctx.fillText("VADER HAS YOU LOCKED IN...",W/2,H*0.18); ctx.textAlign='left'; noGlow();
  }
  if(t>100&&t<185&&Math.sin(t*0.18)>0){
    glow('#ffcc00',18); ctx.fillStyle='#ffee00'; ctx.font='bold 21px Courier New';
    ctx.textAlign='center'; ctx.fillText("YAHOO!  I'VE GOT HIM!",W/2,H*0.22); ctx.textAlign='left'; noGlow();
  }
  if(t>200){
    const ta=Math.min(1,(t-200)/60); ctx.globalAlpha=ta;
    glow('#00ff88',22); ctx.fillStyle='#00ff88'; ctx.font='bold 24px Courier New';
    ctx.textAlign='center'; ctx.fillText("YOU'RE ALL CLEAR, KID!",W/2,H/2-16); noGlow();
    ctx.fillStyle='#cccccc'; ctx.font='16px Courier New';
    ctx.fillText("NOW BLOW THIS THING AND GO HOME!",W/2,H/2+18);
    ctx.textAlign='left'; ctx.globalAlpha=1;
  }
  // Countdown bar at bottom
  if(t>200){
    const prog=Math.min(1,(t-200)/190);
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(W/2-150,H-50,300,14);
    ctx.fillStyle='#00ff88'; ctx.fillRect(W/2-150,H-50,300*prog,14);
  }
}

// ── CINEMATIC ─────────────────────────────────────────────────────────────
function startCinematic(){
  parts=[];
  cine={
    timer:0,
    xwX:90,  xwY:H*0.58, xwVx:1.3, xwVy:-0.25,
    falX:55, falY:H*0.40, falVx:1.5, falVy:-0.18,
    dsX:W*0.27, dsY:H*0.47,
  };
  state='cinematic';
}

function updateCinematic(){
  if(!cine) return;
  const t=cine.timer++;

  // Stars stream fast — dramatic escape
  for(const s of stars){ s.x-=s.spd*2+5; if(s.x<0){ s.x=W; s.y=Math.random()*H; } }

  // Ships fly right and slightly up
  cine.xwX+=cine.xwVx; cine.xwY+=cine.xwVy;
  cine.falX+=cine.falVx; cine.falY+=cine.falVy;

  // Debris particles from Death Star
  if(t>35&&t<320&&t%4===0){
    const a=Math.random()*Math.PI*2, r=30+Math.random()*110;
    explode(cine.dsX+Math.cos(a)*r, cine.dsY+Math.sin(a)*r, t>110);
  }

  // Explosion sound cues
  if(t===55||t===110||t===160) sfxExplode(t>100);

  // Update particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=0.97; p.vy*=0.97;
    p.life-=p.dec; if(p.life<=0) parts.splice(i,1);
  }

  if(t>=500){ cine=null; if(isHighScore(score)) beginNameEntry('win'); else state='win'; }
}

function renderCinematic(){
  if(!cine) return;
  const t=cine.timer;
  const dsX=cine.dsX, dsY=cine.dsY, dsR=155;

  // Space background
  ctx.fillStyle='#00010a'; ctx.fillRect(0,0,W,H);
  for(const s of stars){
    ctx.globalAlpha=0.5+s.r*0.25; ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r*0.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // ── DEATH STAR ──
  const dsAlpha=t<240?1:Math.max(0,1-(t-240)/70);
  if(dsAlpha>0){
    ctx.globalAlpha=dsAlpha;
    // Sphere gradient
    const dg=ctx.createRadialGradient(dsX-50,dsY-50,20,dsX,dsY,dsR);
    dg.addColorStop(0,'#898989'); dg.addColorStop(0.55,'#555'); dg.addColorStop(1,'#282828');
    ctx.fillStyle=dg;
    ctx.beginPath(); ctx.arc(dsX,dsY,dsR,0,Math.PI*2); ctx.fill();
    // Panel grid (clipped to circle)
    ctx.save();
    ctx.beginPath(); ctx.arc(dsX,dsY,dsR,0,Math.PI*2); ctx.clip();
    ctx.strokeStyle='#3e3e3e'; ctx.lineWidth=0.8;
    for(let dy=-dsR;dy<=dsR;dy+=16){
      ctx.beginPath(); ctx.moveTo(dsX-dsR,dsY+dy); ctx.lineTo(dsX+dsR,dsY+dy); ctx.stroke();
    }
    for(let dx=-dsR;dx<=dsR;dx+=16){
      ctx.beginPath(); ctx.moveTo(dsX+dx,dsY-dsR); ctx.lineTo(dsX+dx,dsY+dsR); ctx.stroke();
    }
    // Equatorial trench
    ctx.strokeStyle='#1a1a1a'; ctx.lineWidth=7;
    ctx.beginPath(); ctx.moveTo(dsX-dsR,dsY); ctx.lineTo(dsX+dsR,dsY); ctx.stroke();
    ctx.restore();
    // Superlaser dish
    const dshX=dsX-55, dshY=dsY-62;
    ctx.fillStyle='#353535';
    ctx.beginPath(); ctx.arc(dshX,dshY,34,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.arc(dshX,dshY,27,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#3a3a3a'; ctx.lineWidth=1.5;
    for(const r of [8,15,22]){ ctx.beginPath(); ctx.arc(dshX,dshY,r,0,Math.PI*2); ctx.stroke(); }
    ctx.fillStyle='#444'; ctx.beginPath(); ctx.arc(dshX,dshY,5,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // ── SURFACE EXPLOSIONS ──
  const ePts=[
    {ox:-40,oy:-70,d:35},{ox:50,oy:-25,d:70},{ox:-10,oy:60,d:55},
    {ox:70,oy:35,d:95},{ox:-75,oy:25,d:80},{ox:25,oy:88,d:108},
    {ox:-55,oy:-35,d:122},{ox:90,oy:-55,d:138}
  ];
  for(const ep of ePts){
    const et=t-ep.d; if(et<=0) continue;
    const r=Math.min(et*1.3,50); const a=Math.max(0,1-et/85);
    ctx.globalAlpha=a;
    ctx.fillStyle=`hsl(${22+Math.sin(et*0.1)*15},100%,55%)`;
    ctx.beginPath(); ctx.arc(dsX+ep.ox,dsY+ep.oy,r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.arc(dsX+ep.ox,dsY+ep.oy,r*0.32,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // ── MAIN EXPLOSION BLOOM ──
  if(t>140){
    const mt=t-140, mr=Math.min(mt*2.6,220), ma=Math.max(0,1-mt/150);
    ctx.globalAlpha=ma;
    const mg=ctx.createRadialGradient(dsX,dsY,0,dsX,dsY,mr);
    mg.addColorStop(0,'#ffffff'); mg.addColorStop(0.2,'#ffffaa');
    mg.addColorStop(0.5,'#ff8800'); mg.addColorStop(0.8,'#ff3300');
    mg.addColorStop(1,'rgba(255,30,0,0)');
    ctx.fillStyle=mg;
    ctx.beginPath(); ctx.arc(dsX,dsY,mr,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }

  // ── DEBRIS PARTICLES ──
  for(const p of parts){
    ctx.globalAlpha=p.life; ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // ── SHIPS ESCAPING ──
  // X-Wing faces right (normal draw)
  drawXWing(cine.xwX, cine.xwY, false);
  // Falcon mirrored to face right
  ctx.save();
  ctx.translate(cine.falX, cine.falY);
  ctx.scale(-1,1);
  drawFalcon(0,0);
  ctx.restore();

  // ── SCREEN FLASH ──
  if(t>210&&t<290){
    const fa=Math.sin((t-210)/80*Math.PI)*0.88;
    ctx.fillStyle=`rgba(255,252,230,${fa})`; ctx.fillRect(0,0,W,H);
  }

  // ── WIN TEXT FADE IN ──
  if(t>310){
    const ta=Math.min(1,(t-310)/60);
    ctx.globalAlpha=ta;
    ctx.fillStyle='rgba(0,0,16,0.65)'; ctx.fillRect(0,0,W,H);
    glow('#ffcc00',32);
    ctx.fillStyle='#ffdd00'; ctx.font='bold 54px Courier New';
    ctx.textAlign='center';
    ctx.fillText('GREAT SHOT KID!',W/2,H/2-18);
    noGlow();
    ctx.fillStyle='#ffffff'; ctx.font='bold 20px Courier New';
    ctx.fillText('DEATH STAR DESTROYED!',W/2,H/2+28);
    ctx.textAlign='left';
    ctx.globalAlpha=1;
  }
}

// ── MAIN LOOP (fixed 75fps timestep) ──────────────────────────────────────
const _TICK=1000/90;
let _lastTime=0, _accum=0;
function loop(now){
  if(!_lastTime){ _lastTime=now; requestAnimationFrame(loop); return; }
  _accum+=now-_lastTime;
  _lastTime=now;
  if(_accum>_TICK*5) _accum=_TICK*5;
  while(_accum>=_TICK){
    frame++;
    if(state==='cinematic') updateCinematic();
    else if(state==='han_save') updateHanSave();
    else update();
    _accum-=_TICK;
  }
  if(state==='cinematic') renderCinematic();
  else if(state==='han_save') renderHanSave();
  else {
    render();
    switch(state){
      case 'title': renderTitle(); break;
      case 'dead': renderDead(); break;
      case 'win': renderWin(); break;
      case 'enter_name': renderNameEntry(); break;
      case 'leaderboard': renderLeaderboard(); break;
    }
  }
  requestAnimationFrame(loop);
}

// Start
initStars();
requestAnimationFrame(loop);

})();
</script>

<!DOCTYPE html>
<html><head><style>*{margin:0;padding:0}body{background:#000}</style></head>
<body>
<canvas id="c" width="640" height="360"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
const W=640,H=360;

// Track points scaled to fit thumbnail
const TP=[
  [200,585],[340,608],[480,608],[600,585],
  [700,535],[760,455],[780,365],
  [770,275],[740,200],
  [680,140],[600,110],
  [510,125],[455,168],[400,125],[330,108],
  [240,118],[160,168],[120,250],
  [110,350],[120,450],
  [155,535]
];
const sx=W/900*0.88,sy=H/700*0.88,ox=55,oy=20;
const SP=TP.map(p=>[p[0]*sx+ox,p[1]*sy+oy]);

// Desert bg
ctx.fillStyle='#D4A76A';ctx.fillRect(0,0,W,H);
for(let i=0;i<120;i++){
  ctx.fillStyle=Math.random()>0.5?'#C49A5E':'#DEB87A';
  ctx.beginPath();ctx.arc(Math.random()*W,Math.random()*H,0.5+Math.random()*1.2,0,6.28);ctx.fill();
}

// Track
ctx.beginPath();ctx.moveTo(SP[0][0],SP[0][1]);
for(let i=1;i<SP.length;i++) ctx.lineTo(SP[i][0],SP[i][1]);
ctx.closePath();
ctx.lineWidth=56;ctx.strokeStyle='#5B4228';ctx.lineJoin='round';ctx.lineCap='round';ctx.stroke();
ctx.lineWidth=48;ctx.strokeStyle='#8B7355';ctx.stroke();
ctx.lineWidth=44;ctx.strokeStyle='#8E7758';ctx.stroke();
ctx.setLineDash([5,9]);ctx.lineWidth=0.8;ctx.strokeStyle='rgba(255,255,200,0.15)';ctx.stroke();
ctx.setLineDash([]);

// Start/finish
ctx.save();ctx.translate(SP[0][0]+25,SP[0][1]+3);ctx.rotate(Math.PI/2);
for(let r=0;r<2;r++)for(let c2=-3;c2<3;c2++){
  ctx.fillStyle=(r+c2)%2===0?'#eee':'#222';
  ctx.fillRect(c2*3.5,-24+r*24,3.5,24);
}
ctx.restore();

// Draw pod
function drawPod(x,y,ang,eng,eng2,cock,s){
  ctx.save();ctx.translate(x,y);ctx.rotate(ang);
  ctx.strokeStyle='rgba(120,170,255,0.5)';ctx.lineWidth=1*s;
  ctx.beginPath();ctx.moveTo(5*s,-7*s);ctx.lineTo(-4*s,0);ctx.moveTo(5*s,7*s);ctx.lineTo(-4*s,0);ctx.stroke();
  ctx.fillStyle=eng;
  ctx.beginPath();ctx.ellipse(6*s,-7*s,6*s,3*s,0,0,6.28);ctx.fill();
  ctx.beginPath();ctx.ellipse(6*s,7*s,6*s,3*s,0,0,6.28);ctx.fill();
  ctx.fillStyle=eng2;
  ctx.beginPath();ctx.ellipse(0.5*s,-7*s,2.5*s,1.5*s,0,0,6.28);ctx.fill();
  ctx.beginPath();ctx.ellipse(0.5*s,7*s,2.5*s,1.5*s,0,0,6.28);ctx.fill();
  ctx.fillStyle=cock;
  ctx.beginPath();ctx.ellipse(-5*s,0,4*s,3*s,0,0,6.28);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.2)';
  ctx.beginPath();ctx.ellipse(-4*s,-0.5*s,2*s,1.2*s,0,0,6.28);ctx.fill();
  ctx.restore();
}

// Place 3 pods on the track
// Anakin (blue) - leading on the right straight
drawPod(SP[7][0]-5,SP[7][1]+5,-1.3,'#4488ff','#88ccff','#99aabb',1.6);
// Trail
for(let i=0;i<6;i++){
  ctx.fillStyle='rgba(255,140,40,'+(0.15-i*0.02)+')';
  ctx.beginPath();ctx.arc(SP[7][0]-5+i*4,SP[7][1]+5+i*6,1.3,0,6.28);ctx.fill();
}

// Sebulba (orange) - mid-pack on turn 1
drawPod(SP[5][0],SP[5][1]-3,-0.9,'#ff6622','#ffaa44','#998877',1.6);
for(let i=0;i<5;i++){
  ctx.fillStyle='rgba(255,140,40,'+(0.12-i*0.02)+')';
  ctx.beginPath();ctx.arc(SP[5][0]+i*5,SP[5][1]-3+i*4,1.2,0,6.28);ctx.fill();
}

// Gasgano (green) - behind on bottom straight
drawPod(SP[3][0]-15,SP[3][1],0.05,'#33cc44','#88ff88','#88aa88',1.6);
for(let i=0;i<5;i++){
  ctx.fillStyle='rgba(255,140,40,'+(0.12-i*0.02)+')';
  ctx.beginPath();ctx.arc(SP[3][0]-15-i*5,SP[3][1]+i*0.5,1.2,0,6.28);ctx.fill();
}

// Gold arrow on Anakin
ctx.fillStyle='#FFD700';
ctx.beginPath();
ctx.moveTo(SP[7][0]-5,SP[7][1]+5-14);
ctx.lineTo(SP[7][0]-5-4,SP[7][1]+5-20);
ctx.lineTo(SP[7][0]-5+4,SP[7][1]+5-20);
ctx.closePath();ctx.fill();

// Title overlay
ctx.fillStyle='rgba(0,0,0,0.3)';
ctx.fillRect(0,H-55,W,55);
ctx.textAlign='center';ctx.font='bold 26px monospace';ctx.fillStyle='#FFD700';
ctx.fillText('POD RACER',W/2,H-22);
ctx.font='10px monospace';ctx.fillStyle='#C4975A';
ctx.fillText('BOONTA EVE CLASSIC',W/2,H-8);

// Two suns top-right
ctx.fillStyle='rgba(255,200,50,0.06)';ctx.beginPath();ctx.arc(540,45,30,0,6.28);ctx.fill();
ctx.fillStyle='#FFD080';ctx.beginPath();ctx.arc(540,45,8,0,6.28);ctx.fill();
ctx.fillStyle='rgba(255,150,50,0.04)';ctx.beginPath();ctx.arc(575,65,22,0,6.28);ctx.fill();
ctx.fillStyle='#FFBB70';ctx.beginPath();ctx.arc(575,65,5,0,6.28);ctx.fill();
</script>
</body>
</html>
